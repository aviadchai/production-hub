<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 268px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #141414;
      color: #fff;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .header-icon { font-size: 19px; line-height: 1; }
    .header-title { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }
    .header-version { margin-left: auto; font-size: 10px; color: #444; font-family: monospace; }

    /* ── Auth badge ── */
    .auth-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 9px;
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 14px;
      font-size: 11px;
      min-height: 36px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
    .dot-yellow { background: #fbbf24; }
    .dot-red { background: #f87171; }
    .auth-name { color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .auth-action { color: #555; text-decoration: none; font-size: 10px; flex-shrink: 0; }
    .auth-action:hover { color: #aaa; }

    /* ── Save now button ── */
    .save-now-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 9px;
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.1);
      color: #ddd;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.12s, border-color 0.12s;
      font-family: inherit;
    }
    .save-now-btn:hover { background: #242424; border-color: rgba(255,255,255,0.18); }
    .save-now-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Section label ── */
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      font-weight: 600;
      margin-bottom: 7px;
    }

    /* ── Mode picker (3-column) ── */
    .modes {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 14px;
    }

    .mode-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px 9px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.06);
      cursor: pointer;
      background: #1a1a1a;
      user-select: none;
      transition: border-color 0.12s, background 0.12s;
      text-align: center;
    }
    .mode-option:hover { border-color: rgba(255,255,255,0.14); background: #1f1f1f; }
    .mode-option.selected { border-color: rgba(255,255,255,0.35); background: #222; }

    .mode-icon { font-size: 17px; line-height: 1; }
    .mode-name { font-size: 10.5px; font-weight: 600; color: #bbb; }
    .mode-desc { font-size: 9px; color: #555; line-height: 1.25; }

    .mode-option.selected .mode-name { color: #fff; }
    .selected-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #fff; display: none; margin-top: 2px;
    }
    .mode-option.selected .selected-dot { display: block; }

    /* ── Toggle rows (features) ── */
    .toggles { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border-radius: 9px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .toggle-row:hover { background: #1f1f1f; }
    .toggle-row-icon { font-size: 15px; flex-shrink: 0; }
    .toggle-row-text { flex: 1; }
    .toggle-row-name { font-size: 11.5px; font-weight: 600; color: #ccc; }
    .toggle-row-desc { font-size: 9.5px; color: #555; margin-top: 1px; }

    /* Switch */
    .switch {
      width: 30px; height: 17px;
      border-radius: 99px;
      background: #333;
      position: relative;
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .switch.on { background: #4ade80; }
    .switch-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.18s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .switch.on .switch-knob { transform: translateX(13px); }

    /* ── Divider ── */
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 12px; }

    /* ── Open site link ── */
    .open-site {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 9px;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      transition: opacity 0.12s;
    }
    .open-site:hover { opacity: 0.88; }
    .open-site span:last-child { margin-left: auto; opacity: 0.45; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🎬</span>
    <span class="header-title">Prompt Manager</span>
    <span class="header-version">v2.5</span>
  </div>

  <!-- Auth -->
  <div class="auth-badge" id="auth-badge">
    <div class="dot dot-yellow" id="auth-dot"></div>
    <span class="auth-name" id="auth-name">Checking…</span>
    <a href="#" class="auth-action" id="auth-link" target="_blank" style="display:none"></a>
  </div>

  <!-- Save now (Artlist only) -->
  <button class="save-now-btn" id="save-now-btn" style="display:none" disabled>
    🎬 Save current video
  </button>

  <!-- Save button mode -->
  <div class="section-label">Save button</div>
  <div class="modes" id="modes">

    <div class="mode-option" data-mode="hover">
      <span class="mode-icon">🖱️</span>
      <span class="mode-name">Hover</span>
      <span class="mode-desc">On video hover</span>
      <div class="selected-dot"></div>
    </div>

    <div class="mode-option" data-mode="fab">
      <span class="mode-icon">📌</span>
      <span class="mode-name">Corner</span>
      <span class="mode-desc">Fixed in corner</span>
      <div class="selected-dot"></div>
    </div>

    <div class="mode-option" data-mode="off">
      <span class="mode-icon">🚫</span>
      <span class="mode-name">Off</span>
      <span class="mode-desc">Icon only</span>
      <div class="selected-dot"></div>
    </div>

  </div>

  <!-- Feature toggles -->
  <div class="section-label">Features</div>
  <div class="toggles">

    <div class="toggle-row" data-toggle="showInsertPrompt">
      <span class="toggle-row-icon">⚡</span>
      <div class="toggle-row-text">
        <div class="toggle-row-name">Insert Prompt button</div>
        <div class="toggle-row-desc">Appears near the prompt text field</div>
      </div>
      <div class="switch" id="toggle-showInsertPrompt">
        <div class="switch-knob"></div>
      </div>
    </div>

    <div class="toggle-row" data-toggle="showSaveToLibrary">
      <span class="toggle-row-icon">📚</span>
      <div class="toggle-row-text">
        <div class="toggle-row-name">Save to Library button</div>
        <div class="toggle-row-desc">Shows on prompt cards in the hub</div>
      </div>
      <div class="switch" id="toggle-showSaveToLibrary">
        <div class="switch-knob"></div>
      </div>
    </div>

  </div>

  <div class="divider"></div>

  <a class="open-site" href="https://production-hub-omega-five.vercel.app" target="_blank">
    <span>🎬</span>
    <span>Open Prompt Manager</span>
    <span>↗</span>
  </a>

  <script src="popup.js"></script>
</body>
</html>
